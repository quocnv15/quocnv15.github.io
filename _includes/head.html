<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">

  <!-- Resource Hints -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  {%- seo -%}

  <!-- Critical CSS Inline — mirrors canvas tokens -->
  <style>
    body{margin:0;font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;font-size:16px;line-height:1.6;color:#1e293b;background:#ffffff}
    @media (prefers-color-scheme: dark){
      body{color:#e6eaf2;background:#0b1120}
    }
    *{box-sizing:border-box}
    .wrapper{max-width:1200px;margin:0 auto;padding:0 20px}
    .container{width:100%}
    main{display:block;min-height:100vh;background:inherit}
  </style>

  <!-- Design system (order = cascade; last wins for conflicts) -->
  <link rel="stylesheet" href="{{ "/css/variables.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/base/reset.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/base/typography.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/components/navigation.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/components/layout.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/components/buttons.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/components/cards.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/components/forms.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/components/projects-tools.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/components/lifetime-calculator.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/components/swiftui-page.css" | relative_url }}">
  <link rel="stylesheet" href="{{ "/css/utilities/spacing.css" | relative_url }}">
  <!-- Portfolio / Work / Cases hub surfaces (also linked per-page for cache-bust) -->
  <link rel="stylesheet" href="{{ "/css/portfolio-hub.css" | relative_url }}?v=3">
  <!-- App chrome last — never load minima main.css after this (it forced #fdfdfd body) -->
  <link rel="stylesheet" href="{{ "/css/override.css" | relative_url }}">

  {%- feed_meta -%}
  {%- if jekyll.environment == 'production' and site.google_analytics -%}
    {%- include google-analytics.html -%}
  {%- endif -%}

  {% if page.highlight_js %}
  <link rel="stylesheet" href="/js/highlightjs/styles/github.css">
  <link rel="stylesheet" href="/js/highlightjs/styles/ssms.css" />
  <script type="text/javascript" src="/js/highlightjs/highlight.min.js"></script>
  <script type="text/javascript" src="/js/highlightjs/languages/plaintext.min.js"></script>
  <script type="text/javascript" src="/js/highlightjs/languages/powershell.min.js"></script>
  <script type="text/javascript" src="/js/highlightjs/languages/tsql.min.js"></script>
  <script type="text/javascript"> hljs.highlightAll(); </script>
  {% endif %}
</head>
